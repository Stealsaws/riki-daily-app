<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#FF0000"/>
<title>RIKI Daily Routine</title>
<link rel="manifest" href="manifest.json"/>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#FF0000;--pri2:#CC0000;--pri-bg:#FFF0F0;
  --acc:#F59E0B;--acc-bg:#FEF3C7;
  --ok:#10B981;--ok-bg:#D1FAE5;
  --err:#EF4444;--err-bg:#FEE2E2;
  --warn:#F97316;--warn-bg:#FFEDD5;
  --pur:#7C3AED;--pur-bg:#EDE9FE;
  --txt:#1F2937;--txt2:#6B7280;--txt3:#9CA3AF;
  --bg:#F3F4F6;--white:#FFFFFF;--bdr:#E5E7EB;
  --r:10px;--rl:16px;--rx:24px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shl:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
img{display:block}

/* ---- SCREENS ---- */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.on{display:flex}

/* ---- LOGIN ---- */
#s-login{background:#FF0000;justify-content:center;align-items:center;padding:1.5rem;min-height:100vh}
.lcard{background:var(--white);border-radius:var(--rx);padding:2rem;width:100%;max-width:360px;box-shadow:var(--shl)}
.llogo{width:60px;height:60px;background:var(--pri);border-radius:var(--rl);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;color:#fff;font-size:1.625rem;font-weight:700;box-shadow:0 4px 16px rgba(239,123,73,.4)}
.ltitle{text-align:center;font-size:1.25rem;font-weight:700;color:var(--pri);margin-bottom:.25rem}
.lsub{text-align:center;font-size:.8rem;color:var(--txt2);margin-bottom:1.5rem}
.fg{margin-bottom:.875rem}
.fl{display:block;font-size:.8rem;font-weight:600;color:var(--txt);margin-bottom:.375rem}
.fi{width:100%;padding:.625rem .875rem;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.938rem;color:var(--txt);transition:border .2s}
.fi:focus{outline:none;border-color:var(--pri2)}
.fsel{width:100%;padding:.625rem .875rem;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.875rem;color:var(--txt);background:var(--white)}
.btn-pri{width:100%;padding:.75rem;background:var(--pri);color:#fff;border-radius:var(--r);font-size:.938rem;font-weight:600;margin-top:.5rem;transition:opacity .2s}
.btn-pri:active{opacity:.85}
.btn-pri:disabled{opacity:.5;cursor:not-allowed}

/* ---- TOPBAR ---- */
.topbar{background:#FF3366;color:#000;padding:.875rem 1rem;display:flex;align-items:center;gap:.625rem;position:sticky;top:0;z-index:100}
.tbback{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0}
.tbtitle{flex:1;font-size:.938rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbsub{font-size:.688rem;opacity:.8}
.tbbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.rbadge{padding:.2rem .5rem;border-radius:20px;font-size:.625rem;font-weight:700}
.r-sa{background:rgba(239,68,68,.3);color:#FCA5A5}
.r-ed{background:rgba(124,58,237,.3);color:#C4B5FD}
.r-us{background:rgba(16,185,129,.3);color:#6EE7B7}
.r-vi{background:rgba(255,255,255,.2);color:#fff}

/* ---- TABS ---- */
.tabs{display:flex;gap:.5rem;overflow-x:auto;padding:.625rem 1rem;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--bdr)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.375rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600;color:var(--txt2);border:1.5px solid var(--bdr);white-space:nowrap;cursor:pointer;transition:all .2s}
.tab.on{background:var(--pri-bg);color:var(--pri);border-color:var(--pri2)}

/* ---- BOTTOM NAV ---- */
.bnav{background:#FF3366;border-top:1px solid #CC0044;display:flex;padding:.5rem 0 calc(.5rem + env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:100}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.375rem .25rem;font-size:.563rem;font-weight:600;color:rgba(0,0,0,.5);cursor:pointer}
.bni.on{color:#000}
.bni-icon{font-size:1.25rem}
.bni-dot{width:6px;height:6px;border-radius:50%;background:var(--err);position:absolute;top:0;right:0}
.bni-rel{position:relative}

/* ---- CONTENT ---- */
.content{flex:1;overflow-y:auto;padding-bottom:1rem}
.sec{padding:1rem}
.sec-title{font-size:.688rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.625rem}

/* ---- CARDS ---- */
.card{background:var(--white);border-radius:var(--rl);padding:1rem;box-shadow:var(--sh);margin-bottom:.75rem}
.card-sm{background:var(--white);border-radius:var(--r);padding:.875rem;box-shadow:var(--sh);margin-bottom:.5rem}

/* ---- STATS ---- */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;padding:1rem}
.stat{background:var(--white);border-radius:var(--rl);padding:1rem;box-shadow:var(--sh)}
.stat-n{font-size:1.75rem;font-weight:700;line-height:1}
.stat-l{font-size:.688rem;color:var(--txt2);margin-top:.25rem}

/* ---- PROGRESS ---- */
.pbar{height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;margin:.5rem 0}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.p-blue{background:var(--pri2)}
.p-green{background:var(--ok)}
.p-amber{background:var(--acc)}

/* ---- SHIFT HEADER ---- */
.shift-hdr{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem .25rem;overflow:hidden}
.shift-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.shift-nm{font-size:.813rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.shift-pr{font-size:.75rem;color:var(--txt2);flex-shrink:0;margin-left:.25rem}

/* ---- TASK ITEM ---- */
.titem{display:flex;align-items:flex-start;gap:.625rem;padding:.75rem 1rem;background:var(--white);border-radius:var(--r);margin-bottom:.375rem;box-shadow:var(--sh);cursor:pointer;transition:transform .1s;overflow:hidden}
.titem:active{transform:scale(.99)}
.tchk{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.875rem;margin-top:2px}
.tchk.done{background:var(--ok);border-color:var(--ok);color:#fff}
.tchk.rev{background:var(--err-bg);border-color:var(--err);color:var(--err)}
.tchk.pend{background:var(--acc-bg);border-color:var(--acc)}
.tinfo{flex:1;min-width:0;overflow:hidden}
.tname{font-size:.875rem;font-weight:600;color:var(--txt);margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{font-size:.75rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tarr{color:var(--txt3);font-size:1rem;align-self:center;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:20px;font-size:.688rem;font-weight:600}
.b-done{background:var(--ok-bg);color:#065F46}
.b-pend{background:var(--acc-bg);color:#92400E}
.b-rev{background:var(--err-bg);color:#991B1B}
.b-new{background:var(--pri-bg);color:var(--pri)}
.other-pill{background:var(--pur-bg);color:var(--pur);padding:.1rem .375rem;border-radius:10px;font-size:.625rem;font-weight:600;margin-left:.25rem}

/* ---- PHOTO GRID ---- */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin:.75rem 0}
.pslot{aspect-ratio:1;border-radius:var(--r);overflow:hidden;position:relative;background:var(--bg);border:1.5px dashed var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.pslot.has{border-style:solid;border-color:var(--ok)}
.pslot:active{border-color:var(--pri)}
.pslot-icon{font-size:1.375rem;color:var(--txt3);margin-bottom:.25rem}
.pslot-lbl{font-size:.563rem;color:var(--txt2);text-align:center;padding:0 .25rem;line-height:1.3}
.pslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pslot-ok{position:absolute;top:4px;right:4px;width:18px;height:18px;background:var(--ok);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.625rem}

/* ---- DETAIL BARS ---- */
.detbar{padding:1rem;background:var(--white);border-top:1px solid var(--bdr)}
.btn-full{width:100%;padding:.75rem;border-radius:var(--rl);font-size:.938rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.5rem;transition:opacity .2s}
.btn-full:disabled{opacity:.5}
.btn-full:active:not(:disabled){opacity:.85}
.btn-green{background:var(--ok);color:#fff}
.btn-blue{background:var(--pri);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--pri);color:var(--pri)}
.btn-red{background:var(--err);color:#fff}
.act-row{display:flex;gap:.5rem}
.act-row button{flex:1;padding:.625rem;border-radius:var(--r);font-size:.813rem;font-weight:600}

/* ---- REVIEW ---- */
.rev-item{background:var(--white);border-radius:var(--rl);margin-bottom:.75rem;overflow:hidden;box-shadow:var(--sh)}
.rev-hdr{padding:.875rem 1rem;display:flex;align-items:center;gap:.625rem;cursor:pointer}
.rev-body{border-top:1px solid var(--bdr);padding:.75rem 1rem}
.rev-task{display:flex;align-items:flex-start;gap:.625rem;padding:.5rem 0;border-bottom:1px solid var(--bdr)}
.rev-task:last-child{border-bottom:none}
.rev-photos{display:flex;gap:.375rem;margin:.5rem 0;flex-wrap:wrap}
.rev-photo{width:56px;height:56px;border-radius:8px;background:var(--bg);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:1.375rem;cursor:pointer;overflow:hidden}
.rev-photo img{width:100%;height:100%;object-fit:cover}

/* ---- ADMIN ---- */
.adm-row{display:flex;align-items:center;gap:.625rem;padding:.625rem 0;border-bottom:1px solid var(--bdr)}
.adm-row:last-child{border-bottom:none}
.adm-av{width:38px;height:38px;border-radius:50%;background:var(--pri-bg);color:var(--pri);display:flex;align-items:center;justify-content:center;font-size:.938rem;font-weight:700;flex-shrink:0}
.adm-info{flex:1;min-width:0}
.adm-name{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-meta{font-size:.75rem;color:var(--txt2)}

/* ---- MODAL ---- */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-sh{background:var(--white);border-radius:var(--rx) var(--rx) 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:1.5rem;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 1.25rem}
.mtitle{font-size:1rem;font-weight:700;margin-bottom:1rem}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:.625rem 1.25rem;border-radius:var(--rl);font-size:.813rem;z-index:300;white-space:nowrap;max-width:90vw;animation:tfade 3s forwards}
@keyframes tfade{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* ---- MISC ---- */
.empty{text-align:center;padding:3rem 1rem;color:var(--txt2)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--txt2);font-size:.875rem;gap:.75rem}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.realtime{font-size:.688rem;opacity:.8;display:flex;align-items:center;gap:.25rem}
.rtdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rev-note{background:var(--err-bg);border-radius:var(--r);padding:.625rem .875rem;margin-bottom:.75rem;font-size:.813rem;color:#991B1B}
.ok-note{background:var(--ok-bg);border-radius:var(--r);padding:.625rem .875rem;margin-bottom:.75rem;font-size:.813rem;color:#065F46}
.viewer-bar{background:var(--txt);color:#fff;text-align:center;padding:.5rem;font-size:.75rem}
input[type=file]{display:none}
/* ---- INSPECTOR & SESSION ---- */
.r-in{background:rgba(14,165,233,.3);color:#7DD3FC}
.r-ins{background:rgba(14,165,233,.15);color:#0369A1}
#session-warn{position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--warn);color:#fff;padding:.5rem 1rem;border-radius:0 0 var(--r) var(--r);font-size:.813rem;font-weight:600;z-index:400;max-width:430px;width:100%;text-align:center;cursor:pointer;box-shadow:var(--sh)}
.offline-badge{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:.25rem .875rem;border-radius:var(--rl);font-size:.75rem;font-weight:600;z-index:399;display:none}

.line-preview{background:#06C755;color:#fff;border-radius:var(--rl);padding:1rem;margin:.75rem 0}
.line-hdr{font-size:.688rem;opacity:.8;margin-bottom:.375rem}
.line-msg{font-size:.875rem;font-weight:600;line-height:1.6}
</style>
</head>
<body>

<!-- ======== LOGIN ======== -->
<div class="screen on" id="s-login">
<div class="lcard">
  <div class="llogo">R</div>
  <div class="ltitle">RIKI Daily Routine</div>
  <div class="lsub">ระบบติดตามงานประจำวัน v2.0</div>
  <div class="fg">
    <label class="fl">อีเมล</label>
    <input class="fi" id="l-email" type="email" placeholder="email@example.com" autocomplete="email"/>
  </div>
  <div class="fg">
    <label class="fl">รหัสผ่าน</label>
    <div style="display:flex;align-items:center;border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:#fff">
      <input id="l-pass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password"
        style="flex:1;padding:.625rem .875rem;border:none;outline:none;font-size:.938rem;color:var(--txt);background:transparent;width:0;min-width:0"/>
      <button type="button" id="pw-eye"
        onclick="var i=document.getElementById('l-pass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'"
        style="padding:.625rem .75rem;background:none;border:none;cursor:pointer;font-size:1.125rem;color:#888;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation">👁</button>
    </div>
  </div>
  <button class="btn-pri" id="l-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div id="l-err" style="color:var(--err);font-size:.8rem;text-align:center;margin-top:.75rem;display:none"></div>
  <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr);text-align:center">
    <a href="?viewer=1" style="font-size:.8rem;color:var(--pri)">👁 ดูโหมด Viewer (ไม่ต้อง login)</a>
  </div>
</div>
</div>

<!-- ======== MAIN APP ======== -->
<div class="screen" id="s-main">
  <div id="viewer-bar" style="display:none" class="viewer-bar">👁 โหมดดูเท่านั้น — ไม่ต้องล็อคอิน</div>
  <div class="topbar" id="main-tb">
    <div style="flex:1">
      <div class="tbtitle" id="tb-title">RIKI Daily Routine</div>
      <div class="realtime"><div class="rtdot"></div><span id="tb-sub">กำลังโหลด...</span></div>
    </div>
    <div id="tb-badge" class="rbadge r-us">User</div>
    <button class="tbbtn" onclick="showProfile()" title="โปรไฟล์">👤</button>
  </div>
  <div class="tabs" id="main-tabs">
    <div class="tab on" id="tab-tasks"  onclick="setTab('tasks')">📋 งานวันนี้</div>
    <div class="tab"    id="tab-review" onclick="setTab('review')" style="display:none">🔍 ตรวจงาน</div>
    <div class="tab"    id="tab-admin"  onclick="setTab('admin')"  style="display:none">⚙️ จัดการ</div>
    <div class="tab"    id="tab-report" onclick="setTab('report')">📊 รายงาน</div>
  </div>
  <div class="content" id="main-content"><div class="loader"><div class="spinner"></div>กำลังโหลด...</div></div>
  <div class="bnav">
    <div class="bni on" id="bn-home"   onclick="setTab('tasks')"><div class="bni-icon">🏠</div>หน้าหลัก</div>
    <div class="bni"    id="bn-review" onclick="setTab('review')" style="display:none"><div class="bni-rel"><div class="bni-icon">🔍</div><div id="rev-dot" class="bni-dot" style="display:none"></div></div>ตรวจงาน</div>
    <div class="bni"    id="bn-admin"  onclick="setTab('admin')"  style="display:none"><div class="bni-icon">⚙️</div>จัดการ</div>
    <div class="bni"    id="bn-report" onclick="setTab('report')"><div class="bni-icon">📊</div>รายงาน</div>
  </div>
</div>

<!-- ======== DETAIL SCREEN ======== -->
<div class="screen" id="s-detail">
  <div class="topbar">
    <button class="tbback" onclick="back()">←</button>
    <div style="flex:1">
      <div class="tbtitle" id="det-title">งาน</div>
      <div class="tbsub" id="det-sub">07:30 · กะเช้า</div>
    </div>
    <div id="det-badge" class="badge b-new">ใหม่</div>
  </div>
  <div class="content" id="det-content"></div>
</div>

<!-- ======== MODAL ======== -->
<div class="modal-ov" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-sh"><div class="mhandle"></div><div id="modal-body"></div></div>
</div>

<!-- Hidden file input for photo capture -->
<input type="file" id="photo-input" accept="image/*" capture="environment" onchange="onPhotoSelected(event)"/>

<script>
// ================================================================
//  SUPABASE CLIENT (config loaded from config.js)
// ================================================================
const SB_URL = RIKI_CONFIG.SUPABASE_URL;
const SB_KEY = RIKI_CONFIG.SUPABASE_ANON_KEY;
const AS_URL = RIKI_CONFIG.APPS_SCRIPT_URL;

async function sbRpc(fn, params = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 28000);
  try {
    const res = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
      },
      body: JSON.stringify(params),
      signal: controller.signal,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'HTTP ' + res.status);
    }
    return res.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('หมดเวลาเชื่อมต่อ กรุณาลองใหม่');
    throw e;
  } finally { clearTimeout(timer); }
}

async function asCall(action, body = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 60000);
  try {
    const res = await fetch(AS_URL, {
      method: 'POST',
      body: JSON.stringify({ action, token: S.token, ...body }),
      signal: controller.signal,
    });
    return res.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('หมดเวลา กรุณาลองใหม่');
    throw e;
  } finally { clearTimeout(timer); }
}

// Unified api() — same interface as before, routes internally
async function api(action, body = {}) {
  if (action === 'uploadPhoto') return asCall(action, body);
  const tok = S.token;
  const date = body.date || S.date;
  const bid  = body.branchId || S.branchId;
  const rpcMap = {
    'getDailyTasks':  () => sbRpc('rpc_get_daily_tasks',  { p_token:tok, p_branch_id:bid, p_date:date }),
    'getTaskStatus':  () => sbRpc('rpc_get_task_status',  { p_token:tok, p_branch_id:bid, p_date:date }),
    'submitTask':     () => sbRpc('rpc_submit_task',      { p_token:tok, p_task_id:body.taskId, p_branch_id:bid, p_date:date, p_photos:body.photos, p_remark:body.remark }),
    'saveDraft':      () => sbRpc('rpc_save_draft',       { p_token:tok, p_task_id:body.taskId, p_branch_id:bid, p_date:date, p_photos:body.photos, p_remark:body.remark }),
    'getReviewTasks': () => sbRpc('rpc_get_review_tasks', { p_token:tok, p_date:date }),
    'reviewTask':     () => sbRpc('rpc_review_task',      { p_token:tok, p_sub_id:body.submissionId, p_status:body.status, p_comment:body.comment }),
    'getDashboard':   () => sbRpc('rpc_get_dashboard',    { p_token:tok, p_date:date }),
    'getBranches':    () => sbRpc('rpc_get_branches',     { p_token:tok }),
    'logout':         () => sbRpc('rpc_logout',           { p_token:tok }),
    // Admin ops still via Apps Script (Drive/Sheets)
    'getUsers':()=>asCall(action,body),'getTaskTemplates':()=>asCall(action,body),
    'createUser':()=>asCall(action,body),'updateUser':()=>asCall(action,body),
    'resetPassword':()=>asCall(action,body),'createBranch':()=>asCall(action,body),
    'updateBranch':()=>asCall(action,body),'createTask':()=>asCall(action,body),
    'updateTask':()=>asCall(action,body),'deleteTask':()=>asCall(action,body),
    'getReport':()=>asCall(action,body),'exportReport':()=>asCall(action,body),
    'viewer':()=>asCall(action,body),
  };
  const fn = rpcMap[action];
  if (!fn) throw new Error('Unknown action: ' + action);
  return fn();
}

async function hashPassword(pw) {
  const msg = pw + RIKI_CONFIG.PW_SALT;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const btn   = document.getElementById('l-btn');
  const err   = document.getElementById('l-err');
  if (!email || !pass) { showErr('กรุณากรอกข้อมูลให้ครบ'); return; }
  btn.disabled=true; btn.textContent='กำลังเข้าสู่ระบบ...';
  err.style.display='none';
  try {
    const hash = await hashPassword(pass);
    const r = await sbRpc('rpc_login', { p_email:email, p_hash:hash });
    if (r && r.success) {
      S.token = r.token; S.user = r.user;
      localStorage.setItem(RIKI_CONFIG.SESSION_KEY,
        JSON.stringify({ token:r.token, user:r.user, expiresAt:r.expires_at }));
      activateApp();
    } else {
      showErr((r && r.error) || 'เข้าสู่ระบบไม่สำเร็จ');
    }
  } catch(e) { showErr('เชื่อมต่อไม่ได้: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='เข้าสู่ระบบ'; }
  function showErr(msg) { err.textContent='⚠️ '+msg; err.style.display='block'; }
}

function activateApp() {
  const u = S.user;
  S.branchId = u.branchId; S.branchName = u.branchName;
  const isMulti = ['superadmin','editor','inspector'].includes(u.role);
  document.getElementById('tb-title').textContent = isMulti ? 'ภาพรวมทุกสาขา' : (u.branchName||'สาขา');
  document.getElementById('tb-sub').textContent = u.name + ' · ' + roleLabel(u.role);
  const badge = document.getElementById('tb-badge');
  badge.textContent = roleLabel(u.role);
  badge.className = 'rbadge r-' + {superadmin:'sa',editor:'ed',inspector:'in',user:'us'}[u.role];

  // Show review tab for editor, inspector, superadmin
  if (['editor','inspector','superadmin'].includes(u.role)) {
    document.getElementById('tab-review').style.display='';
    document.getElementById('bn-review').style.display='';
    document.getElementById('rev-dot').style.display='block';
  }
  if (u.role === 'superadmin') {
    document.getElementById('tab-admin').style.display='';
    document.getElementById('bn-admin').style.display='';
  }

  show('s-main');

async function logout() {
  if (S.token) await sbRpc('rpc_logout', {p_token:S.token}).catch(()=>{});
  localStorage.removeItem(RIKI_CONFIG.SESSION_KEY);
  clearInterval(S.pollTimer); clearInterval(S.sessionTimer);
  const banner = document.getElementById('session-warn');
  if (banner) banner.remove();
  S.token=null; S.user=null; S._sessionWarned=false;
  closeModal(); show('s-login');
}

// ================================================================
//  SESSION EXPIRY MONITORING
// ================================================================
function startSessionWatch() {
  clearInterval(S.sessionTimer);
  S.sessionTimer = setInterval(() => {
    if (!S.token) return;
    try {
      const sess = JSON.parse(localStorage.getItem(RIKI_CONFIG.SESSION_KEY)||'{}');
      const remaining = new Date(sess.expiresAt) - new Date();
      const warnMs = RIKI_CONFIG.SESSION_WARN_MIN * 60000;
      if (remaining <= 0) {
        clearInterval(S.sessionTimer);
        showToast('⚠️ Session หมดอายุ กรุณาเข้าสู่ระบบใหม่');
        setTimeout(logout, 2000);
      } else if (remaining <= warnMs && !S._sessionWarned) {
        S._sessionWarned = true;
        showExpiryBanner(Math.ceil(remaining/60000));
      }
    } catch {}
  }, 60000);
}

function showExpiryBanner(mins) {
  if (document.getElementById('session-warn')) return;
  const div = document.createElement('div');
  div.id = 'session-warn';
  div.innerHTML = `⚠️ Session จะหมดอายุใน <b>${mins} นาที</b> — แตะเพื่อต่ออายุ`;
  div.onclick = renewSession;
  document.body.appendChild(div);
}

async function renewSession() {
  const banner = document.getElementById('session-warn');
  if (banner) banner.textContent = '🔄 กำลังต่ออายุ...';
  try {
    const r = await sbRpc('rpc_verify_session', { p_token:S.token });
    if (r && r.success) {
      localStorage.setItem(RIKI_CONFIG.SESSION_KEY,
        JSON.stringify({ token:r.token, user:r.user, expiresAt:r.expires_at }));
      S._sessionWarned = false;
      if (banner) banner.remove();
      showToast('✅ ต่ออายุ Session เรียบร้อย (+8 ชั่วโมง)');
    } else {
      showToast('❌ ไม่สามารถต่ออายุได้ กรุณาเข้าสู่ระบบใหม่');
      setTimeout(logout, 2000);
    }
  } catch { if (banner) banner.remove(); showToast('❌ เชื่อมต่อไม่ได้'); }
}

// ================================================================

function setupOfflineListeners() {
  const badge = (() => {
    const d = document.createElement('div');
    d.className = 'offline-badge'; d.textContent = '📵 ออฟไลน์';
    document.body.appendChild(d); return d;
  })();

  window.addEventListener('online', () => {
    badge.style.display = 'none';
    showToast('📶 กลับมาออนไลน์แล้ว');
    if (S.user) syncOfflineQueue();
  });
  window.addEventListener('offline', () => {
    badge.style.display = 'block';
    showToast('📵 ออฟไลน์ — งานจะเก็บไว้ส่งภายหลัง');
  });
  if (!navigator.onLine) badge.style.display = 'block';
}

function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(RIKI_CONFIG.OFFLINE_KEY)||'[]'); }
  catch { return []; }
}

function addToOfflineQueue(action, body) {
  const q = getOfflineQueue();
  if (q.length >= RIKI_CONFIG.OFFLINE_MAX) {
    showToast('⚠️ คิว offline เต็ม กรุณาซิงค์ก่อน'); return false;
  }
  q.push({ action, body, queuedAt: new Date().toISOString(), qid: Date.now() });
  localStorage.setItem(RIKI_CONFIG.OFFLINE_KEY, JSON.stringify(q));
  return true;
}

async function syncOfflineQueue() {
  const q = getOfflineQueue();
  if (!q.length || !navigator.onLine) return;
  showToast('⏳ กำลังซิงค์ ' + q.length + ' งานจาก offline...');
  const remaining = [];
  for (const item of q) {
    try {
      const r = await api(item.action, item.body);
      if (!r.success && !r.alreadyDone) remaining.push(item);
    } catch { remaining.push(item); }
  }
  localStorage.setItem(RIKI_CONFIG.OFFLINE_KEY, JSON.stringify(remaining));
  const ok = q.length - remaining.length;
  if (ok > 0) {
    showToast('✅ ซิงค์สำเร็จ ' + ok + ' งาน' + (remaining.length ? ' (ล้มเหลว '+remaining.length+')' : ''));
    if (S.user) setTimeout(() => renderTab(S.currentTab), 500);
  }
}

// ================================================================
//  TASKS TAB
// ================================================================
function isMultiBranch() {
  return !S.isViewer && S.user && !['user'].includes(S.user.role);
}

async function loadTasks() {
  try {
    if (isMultiBranch()) {
      if (!S.branches.length) {
        const br = await api('getBranches', {});
        if (br.success) S.branches = br.branches||[];
      }
      if (!S.viewBranchId) {
        S.viewBranchId = S.branchId || (S.branches[0]&&S.branches[0].id) || '';
      }
      const [overview, tasksRes] = await Promise.all([
        api('getDashboard', { date:S.date }),
        S.viewBranchId ? api('getDailyTasks', { branchId:S.viewBranchId, date:S.date })
                       : Promise.resolve({ success:true, tasks:[], stats:{total:0,done:0} }),
      ]);
      S.lastOverview = overview.success ? overview.branches||[] : [];
      if (!tasksRes.success) {
        showError(tasksRes.error); return;
      }
      S.tasks = tasksRes.tasks||[];
      S.lastDayKey = tasksRes.dayKey||'';
      renderTasks(tasksRes);
      return;
    }
    const r = S.isViewer
      ? await api('viewer', { branchId:S.branchId, date:S.date })
      : await api('getDailyTasks', { branchId:S.branchId, date:S.date });
    if (!r.success) { showError(r.error); return; }
    S.tasks = r.tasks||[];
    S.lastDayKey = r.dayKey||'';
    renderTasks(r);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      '<div class="empty"><div class="empty-icon">📡</div>เชื่อมต่อไม่ได้<br><small>'+e.message+'</small>' +
      '<br><br><button onclick="loadTasks()" style="padding:.5rem 1.25rem;background:var(--pri);color:#fff;border-radius:var(--r);font-size:.813rem;font-weight:600;margin-top:.5rem">🔄 ลองใหม่</button></div>';
  }
}

function showError(msg) {
  document.getElementById('main-content').innerHTML =
    '<div class="empty"><div class="empty-icon">⚠️</div>' + (msg||'เกิดข้อผิดพลาด') +
    '<br><br><button onclick="renderTab(S.currentTab)" style="padding:.5rem 1.25rem;background:var(--pri);color:#fff;border-radius:var(--r);font-size:.813rem;font-weight:600;margin-top:.5rem">🔄 โหลดใหม่</button></div>';
}

async function switchViewBranch(branchId) {
  S.viewBranchId = branchId;
  document.getElementById('main-content').innerHTML =
    '<div class="loader"><div class="spinner"></div>กำลังโหลด...</div>';
  try {
    const r = await api('getDailyTasks', { branchId:S.viewBranchId, date:S.date });
    if (!r.success) { showError(r.error); return; }
    S.tasks = r.tasks||[];
    S.lastDayKey = r.dayKey||'';
    renderTasks(r);
  } catch(e) { showError(e.message); }
}

function renderTasks(r) {
  const tasks = r.tasks||[];
  const { total=0, done=0 } = r.stats||{};
  const pct = total>0 ? Math.round(done/total*100) : 0;
  let html = '';

  if (isMultiBranch()) {
    const overview = S.lastOverview||[];
    html += `<div style="padding:.75rem 1rem 0">
      <div style="font-size:.75rem;font-weight:700;color:var(--txt3);margin-bottom:.5rem">ภาพรวมทุกสาขา · ${S.date}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem">
        ${overview.map(b=>`
          <div onclick="switchViewBranch('${b.id}')" style="cursor:pointer;padding:.625rem .75rem;border-radius:var(--r);border:1.5px solid ${b.id===S.viewBranchId?'var(--pri)':'var(--bdr)'};background:${b.id===S.viewBranchId?'var(--pri-bg)':'#fff'}">
            <div style="font-size:.75rem;font-weight:600;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.name}</div>
            <div style="font-size:1.125rem;font-weight:800;color:${b.pct===100?'var(--ok)':'var(--pri)'};margin-top:.125rem">${b.pct}%</div>
            <div style="font-size:.688rem;color:var(--txt3)">${b.done}/${b.total} งาน</div>
          </div>`).join('')}
      </div></div>
    <div style="padding:.75rem 1rem 0">
      <select onchange="switchViewBranch(this.value)" style="width:100%;padding:.5rem .625rem;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.875rem;font-weight:600">
        ${S.branches.map(b=>`<option value="${b.id}" ${b.id===S.viewBranchId?'selected':''}>${b.name}</option>`).join('')}
      </select></div>`;
  }

  html += `<div class="stats-grid">
    <div class="stat"><div class="stat-n" style="color:var(--ok)">${done}</div><div class="stat-l">เสร็จแล้ว / ${total} งาน</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--pri)">${pct}%</div><div class="stat-l">ความคืบหน้า</div></div>
  </div>
  <div style="padding:0 1rem .5rem"><div class="pbar"><div class="pfill ${pct===100?'p-green':'p-blue'}" style="width:${pct}%"></div></div></div>`;

  if (!S.isViewer) {
    const q = getOfflineQueue();
    const offlineBadge = q.length ? `<span style="padding:.2rem .5rem;background:var(--warn-bg);color:var(--warn);border-radius:10px;font-size:.688rem;font-weight:600;cursor:pointer" onclick="syncOfflineQueue()">📵 ${q.length} งานรอซิงค์</span>` : '';
    html += `<div style="padding:0 1rem .75rem;display:flex;align-items:center;gap:.5rem">
      <input type="date" value="${S.date}" onchange="changeDate(this.value)" style="flex:1;padding:.375rem .625rem;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.813rem"/>
      <button onclick="loadTasks()" style="padding:.375rem .75rem;background:var(--pri-bg);color:var(--pri);border-radius:var(--r);font-size:.813rem;font-weight:600;white-space:nowrap">🔄 โหลด</button>
      ${offlineBadge}
    </div>`;
  }

  const DAY_TH = {mon:'จันทร์',tue:'อังคาร',wed:'พุธ',thu:'พฤหัสบดี',fri:'ศุกร์',sat:'เสาร์',sun:'อาทิตย์'};
  const todayDow = r.dayKey||'';

  function taskCard(t) {
    const sub=t.submission, st2=sub?.status||'new';
    const chkCls={submitted:'done',approved:'done',revision:'rev',draft:'pend'}[st2]||'';
    const chkIcon={submitted:'✓',approved:'✓',revision:'↩',draft:'…'}[st2]||'';
    const badgeCls={submitted:'b-done',approved:'b-done',revision:'b-rev',new:'b-new',draft:'b-pend'}[st2]||'b-new';
    const badgeTxt={submitted:'✓ ส่งแล้ว',approved:'✅ อนุมัติ',revision:'↩ แก้ไข',new:'⏳ รอ',draft:'📝 ร่าง'}[st2]||'⏳ รอ';
    const border=st2==='revision'?'border-left:3px solid var(--err)':st2==='draft'?'border-left:3px solid var(--acc)':'';
    const otherPill=sub?.submittedBy&&sub.submittedBy!==S.user?.name?`<span class="other-pill">โดย ${sub.submittedBy}</span>`:'';
    const draftInfo=st2==='draft'?`<span style="font-size:.688rem;color:var(--acc);margin-left:.25rem">📷 ${sub.photoCount||0}/${(t.photoRequirements||[]).length} รูป</span>`:'';
    return `<div class="titem" style="${border}" onclick="openTask('${t.id}')">
      <div class="tchk ${chkCls}">${chkIcon}</div>
      <div class="tinfo">
        <div class="tname">${t.name}</div>
        <div class="tmeta">📷 ${(t.photoRequirements||[]).length} รูป · ${t.time} น.${otherPill}</div>
        <div style="display:flex;align-items:center;gap:.25rem;margin-top:.25rem;flex-wrap:wrap">
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          ${sub?.submittedAt?`<span style="font-size:.688rem;color:var(--txt3)">${safeTime(sub.submittedAt)} น.</span>`:''}
          ${draftInfo}
        </div>
        ${st2==='revision'&&sub?.reviewComment?`<div style="font-size:.75rem;color:var(--err);margin-top:.25rem">⚠️ ${sub.reviewComment}</div>`:''}
      </div>
      <div class="tarr">›</div>
    </div>`;
  }

  ['morning','afternoon'].forEach(shift => {
    const st = tasks.filter(t=>t.dayOfWeek==='daily'&&t.shift===shift);
    if (!st.length) return;
    const sdone = st.filter(t=>['submitted','approved'].includes(t.submission?.status)).length;
    const sinfo = {morning:{label:'กะเช้า',color:'#F59E0B',time:'07:30-16:30'},afternoon:{label:'กะบ่าย',color:'#7C3AED',time:'13:00-22:00'}}[shift];
    html += `<div class="shift-hdr"><div class="shift-dot" style="background:${sinfo.color}"></div><span class="shift-nm" style="color:${sinfo.color}">${sinfo.label} (${sinfo.time})</span><span class="shift-pr">${sdone}/${st.length}</span></div>`;
    html += '<div style="padding:0 .75rem">';
    st.forEach(t=>{html+=taskCard(t);});
    html += '</div>';
  });

  const weekly = tasks.filter(t=>t.dayOfWeek!=='daily');
  if (weekly.length) {
    const wdone = weekly.filter(t=>['submitted','approved'].includes(t.submission?.status)).length;
    html += `<div class="shift-hdr"><div class="shift-dot" style="background:#0EA5E9"></div>
      <span class="shift-nm" style="color:#0EA5E9">📅 งานวัน${DAY_TH[todayDow]||''} (รายสัปดาห์)</span>
      <span class="shift-pr">${wdone}/${weekly.length}</span></div>`;
    html += '<div style="padding:0 .75rem">';
    weekly.forEach(t=>{html+=taskCard(t);});
    html += '</div>';
  }
  document.getElementById('main-content').innerHTML = html;
}

function changeDate(v) { S.date = v; }

// ================================================================
//  TASK DETAIL
// ================================================================
function openTask(id) {
  const task = S.tasks.find(t=>t.id===id);
  if (!task) return;
  S.currentTask = task;
  const sub = task.submission;
  const status = sub?.status||'new';
  const isReadonly = S.isViewer || (S.user?.role==='editor') || (S.user?.role==='inspector');
  const isDone = status==='submitted'||status==='approved';
  const isRevision = status==='revision';

  if (!S.photos[id]||!S.photos[id].some(p=>p?.url)) {
    if (isDone&&sub?.photos?.length) {
      S.photos[id] = sub.photos.map(p=>p?{url:p.url||'',fileId:p.fileId||''}:null);
    } else if (!S.photos[id]) { S.photos[id]=[]; }
  }

  document.getElementById('det-sub').textContent   = task.time+' น. · '+(task.shift==='morning'?'กะเช้า':'กะบ่าย');

  db.textContent = {submitted:'ส่งแล้ว',approved:'อนุมัติ',revision:'แก้ไข',new:'ใหม่'}[status]||'ใหม่';
  db.className = 'badge '+{submitted:'b-done',approved:'b-done',revision:'b-rev',new:'b-new'}[status];

  let html='<div style="padding:1rem">';
  if (isRevision&&sub?.reviewComment) html+=`<div class="rev-note">⚠️ <b>หมายเหตุจาก Editor:</b><br>${sub.reviewComment}</div>`;
  if (isDone&&sub?.submittedBy) html+=`<div class="ok-note">✅ ส่งงานแล้วโดย <b>${sub.submittedBy}</b> เวลา ${safeTime(sub.submittedAt)} น.</div>`;

  html+=`<div style="font-size:.75rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">รูปที่ต้องส่ง (${reqs.length} รูป)</div>`;
  html+='<div class="pgrid">';

    html+=`<div class="pslot ${hasPhoto?'has':''}" onclick="${clickable?`openCamera('${id}',${i})`:''}" id="pslot-${id}-${i}">
      ${hasPhoto?`<img src="${thumbUrl}" alt="${req}" loading="lazy" onerror="this.src='${rawUrl}'"/><div class="pslot-ok">✓</div>`
               :`<div class="pslot-icon">${req.startsWith('📹')?'📹':'📷'}</div><div class="pslot-lbl">${req.replace('📹 ','')}</div>`}
    </div>`;
  });
  html+='</div>';

  html+=`<div style="font-size:.75rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 .5rem">หมายเหตุ</div>`;
  if (!isReadonly&&!isDone) {
    html+=`<textarea id="remark-${id}" class="fi" rows="3" placeholder="เพิ่มหมายเหตุ (ถ้ามี)..." style="width:100%;resize:none;min-height:72px">${isRevision?'แก้ไขแล้ว: ':''}</textarea>`;
  } else {
    html+=`<div style="padding:.625rem .875rem;background:var(--bg);border-radius:var(--r);font-size:.875rem;color:var(--txt2)">${sub?.remark||'—'}</div>`;
  }
  html+='</div>';
  document.getElementById('det-content').innerHTML = html;

  let barHtml='<div class="detbar">';
  if (!isReadonly&&!isDone) {
    const uploaded=photos.filter(p=>p?.url).length;
    const pct=reqs.length>0?Math.round(uploaded/reqs.length*100):0;
    barHtml+=`<div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--txt2);margin-bottom:.25rem">
      <span id="upload-lbl-${id}">อัพโหลดรูปแล้ว ${uploaded}/${reqs.length}</span>
      <span id="upload-pct-${id}" style="font-weight:600;color:var(--pri)">${pct}%</span></div>
      <div class="pbar" style="margin-bottom:.75rem">
        <div class="pfill p-blue" id="upload-bar-${id}" style="width:${pct}%"></div></div>`;
    barHtml+=`<button class="btn-full btn-green" id="sub-btn" ${uploaded<reqs.length?'disabled':''} onclick="submitTask('${id}')">
      📤 ส่งงาน (${uploaded}/${reqs.length} รูป)</button>`;
    if (uploaded>0&&uploaded<reqs.length) {
      barHtml+=`<button class="btn-full" style="border:1.5px solid var(--acc);color:#92400E;background:var(--acc-bg);border-radius:var(--rl);padding:.75rem;font-size:.875rem;font-weight:600;width:100%;margin-top:.5rem" onclick="saveDraftTask('${id}')">
        💾 บันทึกร่าง (${uploaded}/${reqs.length} รูป)</button>`;
    }
    barHtml+=`<button class="btn-full btn-out" style="margin-top:.5rem" onclick="captureAllDemo('${id}')">📷 ทดสอบ: จำลองถ่ายรูปทั้งหมด</button>`;
  }
  barHtml+='</div>';
  document.getElementById('det-content').insertAdjacentHTML('beforeend',barHtml);
  show('s-detail');
}

function openCamera(taskId,idx) { S.photoTargetTask=taskId; S.photoTargetIdx=idx; document.getElementById('photo-input').click(); }

async function onPhotoSelected(e) {
  const file=e.target.files[0]; if (!file) return;
  const taskId=S.photoTargetTask, idx=S.photoTargetIdx;
  showToast('⏳ กำลังอัพโหลดรูป...');
  try {
    const b64=await compressImage(file,1200,0.75);
    const r=await api('uploadPhoto',{base64:b64,filename:`photo_${idx}_${Date.now()}.jpg`,
      branchId:S.branchId,date:S.date,taskId,
      taskName:S.tasks.find(t=>t.id===taskId)?.name||'',photoIndex:idx});
    if (!r.success) throw new Error(r.error);
    if (!S.photos[taskId]) S.photos[taskId]=[];
    S.photos[taskId][idx]={url:r.url,fileId:r.fileId};
    const slot=document.getElementById(`pslot-${taskId}-${idx}`);
    const thumb=driveThumb(r.url,r.fileId);
    if (slot) { slot.className='pslot has'; slot.innerHTML=`<img src="${thumb}" loading="lazy" onerror="this.src='${r.url}'"/><div class="pslot-ok">✓</div>`; }
    updateSubmitBtn(taskId);
    showToast('✅ อัพโหลดรูปเรียบร้อย');
  } catch(err) { showToast('❌ อัพโหลดไม่สำเร็จ: '+err.message); }
  e.target.value='';
}

function driveThumb(url,fileId) {
  if (!url&&!fileId) return '';
  const id=fileId||(url&&url.match(/id=([^&]+)/)?.[1])||'';
  if (!id||id.startsWith('demo_')) return url||'';
  return 'https://drive.google.com/thumbnail?id='+id+'&sz=w300';
}

function updateSubmitBtn(taskId) {
  const task=S.tasks.find(t=>t.id===taskId); if (!task) return;
  const total=(task.photoRequirements||[]).length;
  const uploaded=(S.photos[taskId]||[]).filter(p=>p?.url).length;
  const pct=total>0?Math.round(uploaded/total*100):0;
  const btn=document.getElementById('sub-btn');
  if (btn) { btn.disabled=uploaded<total; btn.innerHTML=`📤 ส่งงาน (${uploaded}/${total} รูป)`; }
  const bar=document.getElementById('upload-bar-'+taskId); if (bar) bar.style.width=pct+'%';
  const lbl=document.getElementById('upload-lbl-'+taskId); if (lbl) lbl.textContent='อัพโหลดรูปแล้ว '+uploaded+'/'+total;
  const pctLbl=document.getElementById('upload-pct-'+taskId); if (pctLbl) pctLbl.textContent=pct+'%';
}

async function captureAllDemo(taskId) {
  const task=S.tasks.find(t=>t.id===taskId); if (!task) return;
  const reqs=task.photoRequirements||[];
  if (!S.photos[taskId]) S.photos[taskId]=[];
  reqs.forEach((req,i) => {
    const canvas=document.createElement('canvas'); canvas.width=200; canvas.height=200;
    const ctx=canvas.getContext('2d');
    const colors=['#EEF3FB','#D1FAE5','#FEF3C7','#EDE9FE','#FEE2E2','#F0FDF4','#E0F2FE'];
    ctx.fillStyle=colors[i%colors.length]; ctx.fillRect(0,0,200,200);
    ctx.font='50px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(['📷','🏪','💰','🧹','📋','💡','🔐'][i%7],100,90);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.font='11px sans-serif';
    ctx.fillText(req.substring(0,24),100,155); ctx.fillText(new Date().toLocaleTimeString('th'),100,172);
    const dataUrl=canvas.toDataURL('image/jpeg',0.5);
    S.photos[taskId][i]={url:dataUrl,fileId:'demo_'+i};
    const slot=document.getElementById(`pslot-${taskId}-${i}`);
    if (slot) { slot.className='pslot has'; slot.innerHTML=`<img src="${dataUrl}" loading="lazy"/><div class="pslot-ok">✓</div>`; }
  });
  updateSubmitBtn(taskId);
  showToast('✅ จำลองรูปครบ '+reqs.length+' รูป — กด "ส่งงาน" ได้เลย');
}

function compressImage(file,maxPx,quality) {
  return new Promise(res => {
    const r=new FileReader();
    r.onload=e => {
      const img=new Image();
      img.onload=() => {
        const cv=document.createElement('canvas');
        let w=img.width,h=img.height;
        if (w>maxPx||h>maxPx) { if (w>h){h=h*maxPx/w;w=maxPx;}else{w=w*maxPx/h;h=maxPx;} }
        cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function saveDraftTask(taskId) {
  const photos=(S.photos[taskId]||[]).filter(p=>p?.url);
  if (!photos.length) { showToast('❌ ยังไม่มีรูป'); return; }
  showToast('⏳ กำลังบันทึกร่าง...');
  try {
    const r=await api('saveDraft',{taskId,branchId:S.branchId,date:S.date,
      photos:photos.map(p=>({url:p.url,fileId:p.fileId||''}))});
    if (r.success) {
      showToast('💾 บันทึกร่างแล้ว — คนอื่นสามารถถ่ายรูปต่อได้');
      const t=S.tasks.find(t=>t.id===taskId);
      if (t) { t.submission={status:'draft',submittedBy:S.user?.name,photoCount:photos.length,photos}; }
      back();
    } else showToast('❌ '+(r.error||'บันทึกไม่สำเร็จ'));
  } catch { showToast('❌ เชื่อมต่อไม่ได้'); }
}

async function submitTask(taskId) {
  const remark=document.getElementById('remark-'+taskId)?.value||'';
  const photos=S.photos[taskId]||[];
  const uploaded=photos.filter(p=>p?.url).length;
  const task=S.tasks.find(t=>t.id===taskId);
  const total=(task?.photoRequirements||[]).length;
  if (uploaded<total) { showToast('❌ ยังอัพโหลดรูปไม่ครบ ('+uploaded+'/'+total+')'); return; }
  const btn=document.getElementById('sub-btn');
  if (btn) { btn.disabled=true; btn.textContent='⏳ กำลังส่ง...'; }

  const payload={taskId,branchId:S.branchId,date:S.date,
    photos:photos.map(p=>({url:p?.url||'',fileId:p?.fileId||''})),remark};

  // Offline handling
  if (!navigator.onLine) {
    const added=addToOfflineQueue('submitTask',payload);
    if (added) {
      showToast('📵 ออฟไลน์ — บันทึกไว้แล้ว จะส่งเมื่อกลับออนไลน์');
      const t=S.tasks.find(t=>t.id===taskId);
      if (t) { t.submission={status:'draft',submittedBy:S.user?.name,photoCount:uploaded}; }
      back();
    }
    if (btn) { btn.disabled=false; btn.textContent='📤 ส่งงาน'; }
    return;
  }

  try {
    const r=await api('submitTask',payload);
    if (r.success) {
      showToast('✅ ส่งงานเรียบร้อย!');
      const t=S.tasks.find(t=>t.id===taskId);
      if (t) {
        t.submission={status:'submitted',submittedBy:S.user?.name,
          submittedAt:new Date().toLocaleTimeString('th',{hour:'2-digit',minute:'2-digit'}),
          photos:photos.map(p=>({url:p?.url,fileId:p?.fileId}))};
      }
      back();
    } else if (r.alreadyDone) {
      showToast('ℹ️ '+(r.error||'งานนี้ส่งแล้ว')); back();
    } else {
      showToast('❌ ส่งงานไม่สำเร็จ: '+(r.error||'กรุณาลองใหม่'));
      if (btn) { btn.disabled=false; btn.textContent='📤 ส่งงาน ('+uploaded+'/'+total+' รูป)'; }
    }
  } catch(e) {
    // If network error, queue offline
    const added=addToOfflineQueue('submitTask',payload);
    if (added) showToast('📵 เชื่อมต่อไม่ได้ — บันทึกไว้แล้ว จะส่งเมื่อกลับออนไลน์');
    else showToast('❌ เชื่อมต่อไม่ได้: '+e.message);
    if (btn) { btn.disabled=false; btn.textContent='📤 ส่งงาน'; }
  }
}

  let html=`<div class="sec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <div class="sec-title" style="margin:0">🔍 งานรอตรวจ (${subs.length} งาน)</div>

    </div>${inspNote}`;

  Object.entries(byBranch).forEach(([bid,branch]) => {
    html+=`<div style="background:var(--pri-bg);border-radius:var(--r);padding:.5rem .875rem;margin-bottom:.5rem;font-size:.813rem;font-weight:700;color:var(--pri)">🏪 ${branch.name} — ${branch.tasks.length} งาน</div>`;
    branch.tasks.forEach(s => {
      const photos=Array.isArray(s.photos)?s.photos.filter(p=>p?.url):[];
      html+=`<div class="card-sm" style="margin-bottom:.75rem">
        <div style="display:flex;align-items:flex-start;gap:.625rem;margin-bottom:.5rem">
          <div style="flex:1;min-width:0">
            <div style="font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.taskName||'—'}</div>
            <div style="font-size:.75rem;color:var(--txt2);margin-top:.125rem">
              โดย <b>${s.submittedBy||'—'}</b>${s.submittedAt?' · '+safeTime(s.submittedAt)+' น.':''} · ${s.shift==='morning'?'☀️ กะเช้า':'🌙 กะบ่าย'}
            </div>
          </div>
          <span class="badge b-pend">⏳ รอตรวจ</span>
        </div>`;
      if (photos.length) {
        html+=`<div style="display:flex;gap:.375rem;margin-bottom:.5rem;flex-wrap:wrap">`;
        photos.slice(0,5).forEach(p => {
          const thumb=driveThumb(p.url,p.fileId);
          html+=`<img data-src="${thumb}" src="" style="width:52px;height:52px;border-radius:8px;object-fit:cover;border:1px solid var(--bdr);cursor:pointer;background:#f0f0f0"

        });

        html+='</div>';
      }

      html+=`<div class="act-row">
        <button class="btn-green" onclick="doReview('${s.submissionId}','approved','')">✅ อนุมัติ</button>

      <div class="adm-info">
        <div class="adm-name">${u.name} <span style="font-size:.688rem;font-weight:600;padding:.1rem .375rem;border-radius:10px;background:${roleBg[u.role]||'var(--bg)'};color:${roleCol[u.role]||'var(--txt2)'}">${roleIcon[u.role]||''} ${roleLabel(u.role)}</span></div>
        <div class="adm-meta">${u.email}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:.25rem;flex-shrink:0">
        <button style="padding:.25rem .5rem;background:var(--pri-bg);color:var(--pri);border-radius:6px;font-size:.688rem;font-weight:600" onclick="openEditUserModal('${u.id}','${u.name}','${u.role}','${u.branchId||''}','${u.email}')">✏️ แก้ไข</button>
        <button style="padding:.25rem .5rem;background:var(--err-bg);color:var(--err);border-radius:6px;font-size:.688rem;font-weight:600" onclick="confirmDeactivate('${u.id}','${u.name}')">🗑 ลบ</button>
      </div></div>`;
  });
  html+='</div>';

  const DOW_LABEL={daily:'ทุกวัน',mon:'จันทร์',tue:'อังคาร',wed:'พุธ',thu:'พฤหัส',fri:'ศุกร์',sat:'เสาร์',sun:'อาทิตย์'};
  const dailyTasks=tasks.filter(t=>(t.dayOfWeek||'daily')==='daily');
  const weeklyTasks=tasks.filter(t=>(t.dayOfWeek||'daily')!=='daily');

  html+=`<div class="sec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem">
      <div class="sec-title" style="margin:0">📋 งานทั้งหมด (${tasks.length})</div>
      <button style="font-size:.75rem;font-weight:600;color:var(--pur);padding:.25rem .625rem;background:var(--pur-bg);border-radius:20px" onclick="openAddTaskModal()">+ เพิ่ม</button>
    </div>`;
  function taskAdmRow(t,bg,col) {
    return `<div class="adm-row">
      <div class="adm-av" style="background:${bg};color:${col};font-size:.563rem;font-weight:700;line-height:1.2;text-align:center">${t.time}<br>${DOW_LABEL[t.dayOfWeek||'daily']||''}</div>
      <div class="adm-info"><div class="adm-name">${t.name}</div><div class="adm-meta">📷 ${(t.photoRequirements||[]).length} รูป</div></div>
      <div style="display:flex;gap:.25rem;flex-shrink:0">
        <button style="padding:.25rem .5rem;background:var(--pri-bg);color:var(--pri);border-radius:6px;font-size:.688rem;font-weight:600" onclick="openEditTaskModal('${t.id}','${t.name}','${t.shift}','${t.time}',${JSON.stringify(t.photoRequirements||[]).replace(/'/g,"&#39;")},'${t.dayOfWeek||'daily'}')">✏️</button>
        <button style="padding:.25rem .5rem;background:var(--err-bg);color:var(--err);border-radius:6px;font-size:.688rem;font-weight:600" onclick="confirmDeleteTask('${t.id}','${t.name}')">🗑</button>
      </div></div>`;
  }
  if (dailyTasks.length) {
    html+=`<div style="font-size:.75rem;font-weight:700;color:var(--pri2);margin:.5rem 0 .25rem;padding:.375rem .625rem;background:var(--pri-bg);border-radius:6px">📋 งาน Daily — ทุกวัน (${dailyTasks.length})</div>`;
    [['morning','☀️ กะเช้า','#FEF3C7','#92400E'],['afternoon','🌙 กะบ่าย','#EDE9FE','#5B21B6']].forEach(([s,l,bg,col])=>{
      const list=dailyTasks.filter(t=>t.shift===s); if (!list.length) return;
      html+=`<div style="font-size:.688rem;color:${col};padding:.25rem .625rem .125rem;font-weight:600">${l} (${list.length})</div>`;
      list.forEach(t=>{html+=taskAdmRow(t,bg,col);});
    });
  }
  if (weeklyTasks.length) {
    html+=`<div style="font-size:.75rem;font-weight:700;color:#0EA5E9;margin:.75rem 0 .25rem;padding:.375rem .625rem;background:#E0F2FE;border-radius:6px">📅 งาน Weekly (${weeklyTasks.length})</div>`;
    ['mon','tue','wed','thu','fri','sat','sun'].forEach(day=>{
      const list=weeklyTasks.filter(t=>t.dayOfWeek===day); if (!list.length) return;
      html+=`<div style="font-size:.688rem;color:#0369A1;padding:.25rem .625rem .125rem;font-weight:600">วัน${DOW_LABEL[day]} (${list.length})</div>`;
      list.forEach(t=>{html+=taskAdmRow(t,'#E0F2FE','#0369A1');});
    });
  }
  html+='</div>';
  document.getElementById('main-content').innerHTML = html;
}

  try {
    const r=await api('getReport',{date:S.date});
    if (!r.success) { showError(r.error); return; }
    renderReport(r);
  } catch(e) { showError(e.message); }
}

function renderReport(r) {
  const branches=r.branches||[];
  let html=`<div class="sec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <div class="sec-title" style="margin:0">📊 รายงานประจำวัน</div>
      <button onclick="loadReport()" style="font-size:.75rem;padding:.25rem .625rem;background:var(--pri-bg);color:var(--pri);border-radius:20px;font-weight:600">🔄 รีเฟรช</button>
    </div>
    <div style="padding:0 0 .75rem;display:flex;align-items:center;gap:.5rem">
      <input type="date" value="${S.date}" onchange="changeDate(this.value)" style="flex:1;padding:.375rem .625rem;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:.813rem"/>
      <button onclick="loadReport()" style="padding:.375rem .75rem;background:var(--pri-bg);color:var(--pri);border-radius:var(--r);font-size:.813rem;font-weight:600;white-space:nowrap">📊 โหลด</button>
    </div>`;
  branches.forEach(b => {
    html+=`<div class="card-sm"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.375rem">
      <div style="font-size:.875rem;font-weight:600">${b.name}</div>
      <span class="badge ${b.done===b.total?'b-done':'b-new'}">${b.pct}%</span></div>
      <div class="pbar"><div class="pfill ${b.done===b.total?'p-green':b.pct>50?'p-blue':'p-amber'}" style="width:${b.pct}%"></div></div>
      <div style="font-size:.75rem;color:var(--txt2);margin-top:.25rem">${b.done}/${b.total} งาน</div>
    </div>`;
  });
  html+=`</div>
  <div class="sec"><div class="sec-title">ตัวอย่าง LINE Notification</div>
    <div class="line-preview"><div class="line-hdr">🔔 เมื่อสาขาส่งงานครบ</div>
    <div class="line-msg">✅ RIKI Daily Routine\n\n🏪 สาขา ซอยดับเพลิง\nส่งงานครบทุกขั้นตอนแล้ว!\n\n📅 ${new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\n📊 19/19 ขั้นตอน ✓</div>
    </div></div>`;
  document.getElementById('main-content').innerHTML = html;
}

  const sess=JSON.parse(localStorage.getItem(RIKI_CONFIG.SESSION_KEY)||'{}');
  const expStr=sess.expiresAt?new Date(sess.expiresAt).toLocaleTimeString('th',{hour:'2-digit',minute:'2-digit'}):'—';

  document.getElementById('modal-body').innerHTML=`

    ${q.length?`<div style="background:var(--warn-bg);border-radius:var(--r);padding:.625rem .875rem;font-size:.75rem;color:#92400E;margin-bottom:.75rem;cursor:pointer" onclick="syncOfflineQueue();closeModal()">📵 ${q.length} งานรอซิงค์ — แตะเพื่อส่งทั้งหมด</div>`:''}
    <button class="btn-full btn-out" style="margin-bottom:.5rem" onclick="renewSession()">🔄 ต่ออายุ Session</button>
    <button class="btn-full btn-out" style="margin-bottom:.5rem" onclick="closeModal()">ปิด</button>
    <button class="btn-full" style="border:1.5px solid var(--err);color:var(--err);border-radius:var(--rl);padding:.75rem;font-size:.938rem;font-weight:600;width:100%" onclick="logout()">🚪 ออกจากระบบ</button>`;
  openModal();
}

// ================================================================
//  POLLING (30s, pause when hidden)
// ================================================================
function lazyLoadImages() {
  const imgs=document.querySelectorAll('img[data-src]'); if (!imgs.length) return;
  if ('IntersectionObserver' in window) {
    const io=new IntersectionObserver((entries,obs)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.src=e.target.dataset.src;obs.unobserve(e.target);}});},{rootMargin:'200px'});
    imgs.forEach(img=>io.observe(img));
  } else { imgs.forEach(img=>{img.src=img.dataset.src;}); }
}

function startPolling() {
  clearInterval(S.pollTimer);
  if (!S._visibilityBound) {
    S._visibilityBound=true;
    document.addEventListener('visibilitychange',()=>{
      if (document.visibilityState==='visible') {
        startPolling();
        if (S.user&&document.getElementById('s-main').classList.contains('on')) renderTab(S.currentTab);
      } else { clearInterval(S.pollTimer); }
    });
  }
  S.pollTimer=setInterval(async()=>{
    if (!S.user||!document.getElementById('s-main').classList.contains('on')) return;
    if (S.currentTab!=='tasks'||document.visibilityState!=='visible') return;
    try {
      const bid=isMultiBranch()?(S.viewBranchId||S.branchId):S.branchId;
      const r=await api('getTaskStatus',{branchId:bid,date:S.date});
      if (!r.success) return;
      let changed=false;
      S.tasks.forEach(t=>{
        const st=r.statuses[t.id]; if (!st) return;
        if (t.submission?.status!==st.status) {
          t.submission=t.submission||{};
          Object.assign(t.submission,{status:st.status,submittedBy:st.submittedBy,submittedAt:st.submittedAt,reviewComment:st.reviewComment});
          changed=true;
        }
      });
      if (changed) {
        const done=S.tasks.filter(t=>['submitted','approved'].includes(t.submission?.status)).length;
        const total=S.tasks.length;
        renderTasks({tasks:S.tasks,stats:{total,done},dayKey:S.lastDayKey});
      }
    } catch {}
  }, 30000);
}

// ================================================================
//  MODAL / TOAST / UTILS
// ================================================================
function openModal() { document.getElementById('modal').style.display='flex'; }
function closeModal(e) { if (!e||e.target===document.getElementById('modal')) document.getElementById('modal').style.display='none'; }

function showToast(msg) {
  const old=document.querySelector('.toast'); if (old) old.remove();
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3200);
}

function safeTime(val) {
  if (!val) return '';
  const s=val.toString();
  if (s.startsWith('1899')||s.startsWith('1900')||s.startsWith('Thu Dec')||s.startsWith('Sat Dec')) return '';
  if (/^\d{2}:\d{2}$/.test(s)) return s;
  if (s.length>10&&s.includes('T')) return s.substring(11,16);
  return s;
}

function roleLabel(r) { return {superadmin:'SuperAdmin',editor:'Editor',inspector:'Inspector',user:'User',viewer:'Viewer'}[r]||r; }

function togglePw() {
  const inp=document.getElementById('l-pass'),eye=document.getElementById('pw-eye');
  if (inp.type==='password'){inp.type='text';eye.textContent='🙈';}else{inp.type='password';eye.textContent='👁';}
}
function toggleModalPw(inputId,eyeId) {
  const inp=document.getElementById(inputId),eye=document.getElementById(eyeId); if (!inp||!eye) return;
  if (inp.type==='password'){inp.type='text';eye.textContent='🙈';}else{inp.type='password';eye.textContent='👁';}
}
